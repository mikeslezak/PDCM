; PlatformIO configuration for PDCM
;
; Platform submodule at firmware/platform/ provides:
;   - can/VehicleCAN.h (vehicle bus CAN IDs)
;   - can/VehicleMessages.h (CAN message structs)
;   - types/VehicleTypes.h (shared enums)
;   - types/ModuleIDs.h (module identifiers)

[platformio]
src_dir = firmware

[env:PDCM]
platform = teensy
board = teensy41
framework = arduino
lib_deps =
    https://github.com/tonton81/FlexCAN_T4.git
build_flags =
    -D PDCM_NODE
    -D PDCM_TARGET_TEENSY
    -Ifirmware/platform
    -Ifirmware/shared
    -Ifirmware/hal
    -O2
    -Wall
    -Wextra
build_src_filter =
    +<src/*.cpp>
    +<hal/teensy/TeensyHAL.cpp>
monitor_speed = 115200
